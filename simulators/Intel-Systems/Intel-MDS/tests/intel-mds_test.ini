:: Intel-MDS Integration Tests
::
:: Exercise simulator command paths that unit tests cannot cover directly.

cd %~p0

echof -n "** Intel-MDS: Intel HEX load/dump callback: "

set sys model=MDS-225
load -h i8080-loader.hex
if 2120!=01 echof "LOAD -H failed at 2120"; exit 1
if 2121!=02 echof "LOAD -H failed at 2121"; exit 1
if 2122!=03 echof "LOAD -H failed at 2122"; exit 1
if 2100!=aa echof "LOAD -H failed lowercase record"; exit 1

dump -h %SIMH_TEST_OUTPUT_DIR%/i8080-loader-dump.hex 2120 2122

deposit 2120 00
deposit 2121 00
deposit 2122 00

load -h %SIMH_TEST_OUTPUT_DIR%/i8080-loader-dump.hex
if 2120!=01 echof "DUMP -H reload failed at 2120"; exit 1
if 2121!=02 echof "DUMP -H reload failed at 2121"; exit 1
if 2122!=03 echof "DUMP -H reload failed at 2122"; exit 1

echof "passed"

echof -n "** Intel-MDS: i8080 symbolic assembly/disassembly: "

deposit -m 2100 MVI A,05
deposit -m 2102 MVI B,03
deposit -m 2104 ADD B
deposit -m 2105 HLT
examine -m 2100-2105
go 2100
if A!=08 echof "i8080 symbolic program 1 expected A=08"; exit 1
if PC!=2105 echof "i8080 symbolic program 1 expected PC=2105"; exit 1

deposit -m 2200 MVI A,00
deposit -m 2202 MVI B,03
deposit -m 2204 INR A
deposit -m 2205 DCR B
deposit -m 2206 JNZ 2204
deposit -m 2209 HLT
examine -m 2200-2209
go 2200
if A!=03 echof "i8080 symbolic program 2 expected A=03"; exit 1
if BC!=0000 echof "i8080 symbolic program 2 expected BC=0000"; exit 1
if PC!=2209 echof "i8080 symbolic program 2 expected PC=2209"; exit 1

deposit -m 2300 LXI H,2400
deposit -m 2303 MVI M,5A
deposit -m 2305 MOV A,M
deposit -m 2306 STA 2401
deposit -m 2309 LDA 2401
deposit -m 230C HLT
examine -m 2300-230C
go 2300
if A!=5A echof "i8080 symbolic program 3 expected A=5A"; exit 1
if HL!=2400 echof "i8080 symbolic program 3 expected HL=2400"; exit 1
if 2400!=5A echof "i8080 symbolic program 3 expected memory 2400=5A"; exit 1
if 2401!=5A echof "i8080 symbolic program 3 expected memory 2401=5A"; exit 1

deposit -m 2500 LXI SP,2600
deposit -m 2503 MVI A,11
deposit -m 2505 CALL 2510
deposit -m 2508 HLT
deposit -m 2510 INR A
deposit -m 2511 RET
examine -m 2500-2511
go 2500
if A!=12 echof "i8080 symbolic program 4 expected A=12"; exit 1
if SP!=2600 echof "i8080 symbolic program 4 expected SP=2600"; exit 1
if PC!=2508 echof "i8080 symbolic program 4 expected PC=2508"; exit 1

deposit -m 2700 mvi a,00
deposit -m 2702 mvi c,0f
deposit -m 2704 MOV D, C
deposit -m 2705 add d
deposit -m 2706 hlt
examine -m 2700-2706
go 2700
if A!=0F echof "i8080 symbolic program 5 expected A=0F"; exit 1
if BC!=000F echof "i8080 symbolic program 5 expected BC=000F"; exit 1
if DE!=0F00 echof "i8080 symbolic program 5 expected DE=0F00"; exit 1
if PC!=2706 echof "i8080 symbolic program 5 expected PC=2706"; exit 1

echof "passed"
exit 0
