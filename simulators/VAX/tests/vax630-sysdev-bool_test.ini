:: vax630-sysdev-bool_test.ini
::
:: Check that the KA630 diagnostic and halt/autoboot flags behave as
:: one-bit simulator registers before their t_bool storage is converted to C
:: bool.

echof -n "** MicroVAX II: SYSD bool flag test: "

if (DIAG != 0) echof "initial DIAG not clear"; exit 1
if (HLTENAB != 1) echof "initial HLTENAB not set"; exit 1

set cpu diag=full
if (DIAG != 1) echof "DIAG=FULL did not set DIAG"; exit 1

set cpu diag=min
if (DIAG != 0) echof "DIAG=MIN did not clear DIAG"; exit 1

set cpu autoboot
if (HLTENAB != 0) echof "AUTOBOOT did not clear HLTENAB"; exit 1

set cpu noautoboot
if (HLTENAB != 1) echof "NOAUTOBOOT did not set HLTENAB"; exit 1

echof "passed."
exit 0
