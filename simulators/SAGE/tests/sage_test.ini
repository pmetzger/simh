:: sage_test.ini
::
:: Verify that the 68k pending-interrupt register is exposed as a mask, not
:: as a single boolean flag.  The CPU uses IRQPEN bits 1-7 for pending
:: interrupt levels.

echof -n "** SAGE: m68k IRQPEN mask register test: "

deposit cpu irqpen 0xAA
if (IRQPEN != 0xAA) echof "IRQPEN did not preserve alternating mask bits"; exit 1

deposit cpu irqpen 0x55
if (IRQPEN != 0x55) echof "IRQPEN did not preserve inverse mask bits"; exit 1

deposit cpu irqpen 0
if (IRQPEN != 0) echof "IRQPEN did not clear"; exit 1

echof "passed."
exit 0
